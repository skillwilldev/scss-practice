<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
    <!-- 1. ნავიგაცია და ფილტრი -->
    <nav class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 p-4">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex gap-6">
                <a href="#"
                    class="pb-1 border-b-2 border-transparent hover:border-cyan-400 hover:text-cyan-400 transition-all duration-300">მთავარი</a>
                <a href="#"
                    class="pb-1 border-b-2 border-transparent hover:border-cyan-400 hover:text-cyan-400 transition-all duration-300">კურსები</a>
                <a href="#"
                    class="pb-1 border-b-2 border-transparent hover:border-cyan-400 hover:text-cyan-400 transition-all duration-300">ჩემი
                    გვერდი</a>
            </div>

            <div class="relative w-full md:w-64">
                <input type="text" placeholder="ძებნა..."
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent focus:shadow-[0_0_15px_rgba(34,211,238,0.3)] transition-all">
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        <h1 class="text-3xl font-bold mb-8 text-cyan-400">პოპულარული კურსები</h1>

        <!-- 2. კურსების ბადე (Grid Layout) -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

            <!-- 3. Course Card (ბარათი) -->
            <!-- ვიყენებთ 'group' კლასს ჰოვერისთვის -->
            <div
                class="group bg-slate-800 rounded-2xl overflow-hidden border border-slate-700 hover:border-cyan-500/50 transition-colors shadow-xl">

                <!-- სურათის კონტეინერი -->
                <div class="relative h-48 overflow-hidden">
                    <img src="https://plus.unsplash.com/premium_photo-1775242393752-06288a282522?q=80&w=735&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                        alt="Course"
                        class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">

                    <!-- ლექტორის ავატარი (Absolute/Z-index) -->
                    <div class="absolute -bottom-6 left-6 z-10">
                        <img src="https://images.unsplash.com/photo-1516247524857-8dc5f4786cb3?q=80&w=735&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                            class="w-12 h-12 rounded-full border-4 border-slate-800 shadow-lg">
                    </div>
                </div>

                <div class="p-6 pt-10">
                    <div class="flex justify-between items-center mb-2">
                        <span
                            class="text-xs font-semibold px-2 py-1 bg-cyan-400/10 text-cyan-400 rounded">Development</span>
                        <span class="text-sm text-slate-400">80% დასრულებული</span>
                    </div>

                    <h3 class="text-xl font-bold mb-4 group-hover:text-cyan-400 transition-colors">React & Tailwind v4
                        Mastery</h3>

                    <!-- პროგრესის ზოლი -->
                    <div class="w-full bg-slate-700 h-2 rounded-full overflow-hidden">
                        <div class="bg-cyan-500 h-full w-[80%] rounded-full shadow-[0_0_10px_rgba(6,182,212,0.5)]">
                        </div>
                    </div>

                    <button
                        class="mt-6 w-full py-3 bg-slate-700 group-hover:bg-cyan-600 text-white font-bold rounded-xl transition-all">
                        გაგრძელება
                    </button>
                </div>
            </div>

        </div>
    </main>
</body>




</html>
