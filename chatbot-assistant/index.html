<!DOCTYPE html>
<html lang="ka">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/main.css">
    <title>Chat App</title>
</head>

<body>
    <div class="app-wrapper">
        <aside class="chat-sidebar">
            <header>
                <h4>Messenger</h4>
                <input type="text" class="search-area" placeholder="ძებნა...">
            </header>
            <div class="contact-list">
                <div class="contact-item active">
                    <div class="avatar">AI</div>
                    <div class="container-details">
                        <h4>Gemini Assistant</h4>
                        <p>ონლაინ<span class="status--online"></span></p>
                    </div>
                </div>
                <div class="contact-item">
                    <div class="avatar">TS</div>
                    <div class="container-details">
                        <h4>Support Team</h4>
                        <p>ხაზზე არაა <span class="status--offline"></span></p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="chat-window">
            <nav>
                <div class="chat-info">
                    <h2>Gemini Assistant</h2>
                    <span class="small">აქტიურია ახლა</span>
                </div>
                <div class="nav-icons">
                    <button>•••</button>
                </div>
            </nav>

            <section class="messages-container">
                <div class="msg bot">
                    <div class="bubble">გამარჯობა! მე შემიძლია დაგეხმაროთ SCSS-ის და HTML-ის სტრუქტურირებაში.</div>
                </div>
                <div class="msg user">
                    <div class="bubble">მჭირდება კომპლექსური დიზაინი Javascript-ის გარეშე</div>
                </div>
            </section>

            <footer>
                <div class="input-bar">
                    <!-- <button class="attach-btn">+</button> -->
                    <input type="text" placeholder="დაწერე შეტყობინება...">
                    <button class="send-btn">></button>
                </div>
            </footer>
        </main>
    </div>
</body>

</html>
