<body>

    <div class="loader-container">
        <div class="loader">
            <span>იტვირთება...</span>

        <defs>
            <clipPath id="wave1" clipPathUnits="objectBoundingBox">

            </clipPath>

            <clipPath id="wave2" clipPathUnits="objectBoundingBox">
                <path d="M0,0 L1,0 L1,0.7 C0.7,1 0.4,0.6 0,0.9 Z"></path>
            </clipPath>
        </defs>
    </svg>
