<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Modular Robot Builder</title>
    <link rel="stylesheet" href="./css/main.css">

</head>

<body>
    <div class="robot-container">
        <!-- Head and antenna -->
        <div class="antenna"></div>
        <div class="head">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>

        <!-- Torso and arms -->
        <div class="body">
            <div class="arm left">
                <div class="shield"></div>
            </div>
            <div class="arm right">
                <div class="tool"></div>
            </div>
        </div>

        <!-- Legs -->
        <div class="legs-container">
            <div class="leg"></div>
            <div class="leg"></div>
        </div>
    </div>

</body>

</html>
