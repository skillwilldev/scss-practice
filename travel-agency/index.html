<!DOCTYPE html>
<html lang="ka">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;700&display=swap" rel="stylesheet">
    <title>Travel Agency</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <section class="container">
        <h1 class="section-title">აღმოაჩინე სამყარო</h1>
        <div class="tour-grid">
            <article class="card">
                <div class="card__image">
                    <img src="./img/1.avif" alt="Paris">
                </div>
                <div class="card__content">
                    <h3>რომანტიკული პარიზი</h3>
                    <span class="price">$1,250</span>
                    <button class="card__button">დაჯავშნა</button>
                </div>
            </article>

            <article class="card">
                <div class="card__image">
                    <img src="./img/2.avif" alt="Venice">
                </div>
                <div class="card__content">
                    <h3>ვენეციის არხები</h3>
                    <span class="price">$980</span>
                    <button class="card__button">დაჯავშნა</button>
                </div>
            </article>

            <article class="card">
                <div class="card__image">
                    <img src="./img/3.avif" alt="London">
                </div>
                <div class="card__content">
                    <h3>ლონდონის თავგადასავალი</h3>
                    <span class="price">$1,100</span>
                    <button class="card__button">დაჯავშნა</button>
                </div>
            </article>
        </div>
    </section>
</body>

</html>
